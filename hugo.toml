baseURL = 'https://stefanomondino.com/'
theme = "mana"
defaultContentLanguage = "en"
defaultContentLanguageInSubdir = false
title = "Stefano Mondino"

[pagination]
  pageSize = 10

[markup]
  [markup.tableOfContents]
    startLevel = 1
    endLevel = 6
    ordered = false
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
    [markup.goldmark.parser]
      [markup.goldmark.parser.attribute]
        block = true
        title = true
  [markup.highlight]
    codeFences = true
    guessSyntax = true
    noClasses = false
    style = "catppuccin-macchiato"

[outputs]
  home = ["HTML", "JSON"]

[sitemap]
  changefreq = "weekly"
  priority = 0.5
  filename = "sitemap.xml"

[params]
  enableIntegrity = false
  author = "Stefano Mondino"
  heroTitleLine1 = "STEFANO"
  heroTitleLine2 = "MONDINO"
  footerText = "Built with Hugo and Mana theme"
  ogImage = "images/IMG_3486.jpeg"

  [params.social]
    github = "https://github.com/stefanomondino"
    linkedin = "https://www.linkedin.com/in/stefanomondino"
    instagram = "https://www.instagram.com/puntoste"
    youtube = "https://www.youtube.com/@mrpuntoste"
    twitter = "puntoste"

  [params.avatar.home]
    assetPath = "images/IMG_3486.jpeg"
    enableResize = true
  [params.avatar.about]
    assetPath = "images/IMG_3486.jpeg"
    enableResize = true

  [params.buyMeACoffee]
    enabled = false

  [params.codeHighlight]
    darkTheme = "catppuccin-macchiato"
    lightTheme = "catppuccin-frappe"

  [params.copyright]
    startYear = 2025
    owner = "Stefano Mondino"

  [params.goatcounter]
    url = "https://stats.stefanomondino.com"

  [params.admonitions]
    alertStyle = "favicon"

# ── English ────────────────────────────────────────────────────────────────────
[languages.en]
  languageName = "English"
  weight = 1
  [languages.en.params]
    description = "iOS developer · Swift enthusiast · speaker · musician"

[[languages.en.menus.main]]
  name = "Home"
  pageRef = "/"
  weight = 10

[[languages.en.menus.main]]
  name = "Posts"
  pageRef = "/posts"
  weight = 20

[[languages.en.menus.main]]
  name = "Speaking"
  pageRef = "/speaking"
  weight = 25

[[languages.en.menus.main]]
  name = "Tags"
  pageRef = "/tags"
  weight = 30

[[languages.en.menus.main]]
  name = "About"
  pageRef = "/about"
  weight = 40

