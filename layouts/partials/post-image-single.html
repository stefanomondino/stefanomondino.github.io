{{ $resolved := partial "post-image-resolve.html" . }}
{{ $image := $resolved.image }}
{{ $imageResource := $resolved.imageResource }}

{{ if $image }}
  <div class="post-image-single">
    {{ if $imageResource }}
      {{ $resized := $imageResource.Process "fit 1200x630 webp q80" }}
      <img
        src="{{ $resized.RelPermalink }}"
        alt="{{ if .Description }}{{ .Description }}{{ else }}{{ .Title }} - Featured image{{ end }}"
        loading="eager"
        width="{{ $resized.Width }}"
        height="{{ $resized.Height }}">
    {{ else }}
      <img
        src="{{ $image | relURL }}"
        alt="{{ if .Description }}{{ .Description }}{{ else }}{{ .Title }} - Featured image{{ end }}"
        loading="eager"
        width="1200"
        height="630">
    {{ end }}
  </div>
{{ end }}
